<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UI Theme Project</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HERO -->
<section class="hero">
  <h1 id="typing"></h1>
  <img src="https://cdn-icons-png.flaticon.com/512/727/727245.png" class="cassette">
  <!-- BUTTON -->
  <button id="startBtn">Start Experience</button>
</section>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
   <img src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" class="pinky">
    <h2>🤝 Promise to continue?</h2>
    <p>This journey is about trust & vibes ✨</p>

    <div class="buttons">
      <button id="yesBtn">Yes 🤝</button>
      <button id="noBtn">No 😢</button>
    </div>
  </div>
</div>

<!-- CARDS -->
<section class="cards">
  <div class="card">
    <h3>🎵 Memory One</h3>
    <p>Moments that stay forever</p>
  </div>
  <div class="card">
    <h3>💫 Dream Big</h3>
    <p>Turn imagination into reality</p>
  </div>
  <div class="card">
    <h3>🚀 Future</h3>
    <p>Everything starts here</p>
  </div>
</section>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script src="script.js"></script>
</body>
</html>
